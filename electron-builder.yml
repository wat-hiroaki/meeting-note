appId: com.meeting-note.app
productName: meeting-note
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!out/renderer/src/**"
extraResources:
  - from: scripts/
    to: scripts/
    filter:
      - "**/*.py"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-category.productivity
asar: true
