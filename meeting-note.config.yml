# meeting-note configuration
# Copy to %APPDATA%/meeting-note/config.yml to customize

recording:
  device: "default"
  format: "wav"
  sampleRate: 16000

transcription:
  mode: "local"           # local | api | remote
  model: "large-v3"
  language: "ja"
  # API settings (when mode: api) — OpenAI Whisper API
  api:
    apiKey: ""            # OpenAI API key (BYOK)
    model: "whisper-1"
  # Remote settings (when mode: remote)
  remote:
    host: ""
    user: ""
    pythonPath: "python3"
    scriptPath: "~/transcribe.py"

summary:
  mode: "cli"             # cli | anthropic | openai | gemini
  language: "ja"
  meetingFormat: "auto"   # auto | sales | standup | team | one_on_one | brainstorm
  customInstructions: ""  # Custom instructions for summary generation
  anthropic:
    apiKey: ""
    model: "claude-sonnet-4-20250514"
    maxTokens: 4096
  openai:
    apiKey: ""
    model: "gpt-4o"
  gemini:
    apiKey: ""
    model: "gemini-2.5-flash"

output:
  directory: "./meetings"
  filenameFormat: "YYYY-MM-DD_HHmm"

notion:
  enabled: false
  apiKey: ""
  databaseId: ""

slack:
  enabled: false
  token: ""
  channel: ""

remote:
  enabled: false
  host: ""
  user: ""
  path: "~/meetings"

calendar:
  enabled: false
  provider: "google"      # google | outlook
  google:
    clientId: ""
    clientSecret: ""
    refreshToken: ""
  autoDetectMeetings: true

meetingDetection:
  enabled: true
  autoPrompt: true        # Show prompt when meeting app detected

consent:
  enabled: false
  message: "This meeting is being recorded and transcribed by AI."

hotkeys:
  toggle: "Ctrl+Shift+M"
  record: "Ctrl+Shift+R"
  pause: "Ctrl+Shift+P"
  stop: "Ctrl+Shift+S"
